<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診察用まとめ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: auto; padding: 20px; background: #fff4e6; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #d9480f; text-align: center; font-size: 1.5em; }
        .summary-btn { width: 100%; padding: 15px; background: #fd7e14; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        .chart-container { position: relative; height: 300px; width: 100%; margin-top: 20px; }
        .note-area { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #dee2e6; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏥 診察用まとめ</h1>
        <p style="text-align:center; font-size:0.8em; color:#666;">直近14日間の記録を集計します</p>
        <button class="summary-btn" onclick="generateReport()">記録をまとめて表示</button>
        <div id="report-area" style="display:none;">
            <div class="chart-container"><canvas id="myChart"></canvas></div>
            <div class="note-area"><strong>【メモ一覧】</strong><ul id="note-list"></ul></div>
        </div>
    </div>
    <script>
        function generateReport() {
            const logs = JSON.parse(localStorage.getItem('innernote_logs')) || [];
            if (logs.length === 0) { alert("記録がありません。"); return; }
            const lastLogs = logs.slice(-14);
            const noteList = document.getElementById('note-list');
            noteList.innerHTML = "";
            lastLogs.forEach(l => { if(l.note) { const li = document.createElement('li'); li.innerText = `${l.date}: ${l.note}`; noteList.appendChild(li); } });
            document.getElementById('report-area').style.display = 'block';
            new Chart(document.getElementById('myChart'), {
                type: 'line',
                data: {
                    labels: lastLogs.map(l => l.date),
                    datasets: [
                        { label: '気分', data: lastLogs.map(l => l.mood), borderColor: '#ff6384', tension: 0.3 },
                        { label: '体調', data: lastLogs.map(l => l.condition), borderColor: '#36a2eb', tension: 0.3 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 1, max: 10 } } }
            });
        }
    </script>
</body>
</html>
