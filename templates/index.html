<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerNote</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 娘さんのデザイン（画像 1000003521.png）を忠実に再現 */
        body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 15px; background: #fdfdfd; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: #007bff; font-size: 1.6em; margin-bottom: 5px; }
        .sub-header { font-size: 0.8em; color: #666; font-weight: bold; }
        h2 { font-size: 0.9em; text-align: center; margin: 15px 0 10px; font-weight: bold; }
        .btn-group { display: flex; justify-content: space-around; margin-bottom: 20px; gap: 8px; }
        .opt-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 1em; color: #333; }
        .opt-btn.active { background: #e7f3ff; border-color: #007bff; color: #007bff; font-weight: bold; }
        textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 15px; font-size: 1em; }
        .save-btn { width: 100%; padding: 15px; background: #4a90e2; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1em; cursor: pointer; }
        .chart-container { position: relative; height: 260px; width: 100%; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .history-item { margin-top: 20px; padding: 15px; border-top: 1px solid #eee; font-size: 0.9em; line-height: 1.6; }
        .history-date { font-weight: bold; color: #333; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>InnerNote</h1>
            <div class="sub-header">**気分と調子の変化を記録**</div>
        </div>
        
        <h2>今日の気分は？</h2>
        <div class="btn-group">
            <button class="opt-btn" onclick="setVal('mood', 1, this)">低</button>
            <button class="opt-btn active" onclick="setVal('mood', 5, this)">普通</button>
            <button class="opt-btn" onclick="setVal('mood', 10, this)">良い</button>
        </div>

        <h2>体の調子は？</h2>
        <div class="btn-group">
            <button class="opt-btn" onclick="setVal('cond', 1, this)">悪い</button>
            <button class="opt-btn active" onclick="setVal('cond', 5, this)">普通</button>
            <button class="opt-btn" onclick="setVal('cond', 10, this)">良い</button>
        </div>

        <textarea id="note" rows="3" placeholder="今の気持ちをメモ..."></textarea>
        <button class="save-btn" onclick="saveData()">記録する</button>

        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>

        <div id="history-area"></div>
    </div>

    <script>
        let currentData = { mood: 5, cond: 5 };
        let chartInstance = null;

        function setVal(type, val, btn) {
            currentData[type] = val;
            const group = btn.parentElement;
            group.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function saveData() {
            const note = document.getElementById('note').value;
            const logs = JSON.parse(localStorage.getItem('innernote_logs')) || [];
            const now = new Date();
            // 日付と時間を分けて保存
            const dateStr = now.getFullYear() + '/' + (now.getMonth() + 1) + '/' + now.getDate();
            const timeStr = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
            
            logs.push({ date: dateStr, time: timeStr, mood: currentData.mood, condition: currentData.cond, note: note });
            localStorage.setItem('innernote_logs', JSON.stringify(logs));
            alert("記録しました！");
            document.getElementById('note').value = "";
            updateView();
        }

        function updateView() {
            const logs = JSON.parse(localStorage.getItem('innernote_logs')) || [];
            if (logs.length === 0) return;

            // 履歴の表示
            const historyArea = document.getElementById('history-area');
            historyArea.innerHTML = "";
            logs.slice(-5).reverse().forEach(l => {
                historyArea.innerHTML += `
                    <div class="history-item">
                        <div class="history-date">【${l.date} ${l.time || ''}】</div>
                        <div>気分: ${l.mood === 10 ? '良い' : l.mood === 1 ? '低' : '普通'} / 体: ${l.condition === 10 ? '良い' : l.condition === 1 ? '悪い' : '普通'}</div>
                        <div>${l.note || ''}</div>
                    </div>`;
            });

            // グラフの更新
            const last10 = logs.slice(-10);
            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('myChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    // ここで日付と時間の2行表示を実現しています
                    labels: last10.map(l => [l.date, l.time || '']),
                    datasets: [
                        { label: '気分', data: last10.map(l => l.mood), borderColor: '#4a90e2', backgroundColor: '#4a90e2', tension: 0.3 },
                        { label: '体調', data: last10.map(l => l.condition), borderColor: '#f5a623', backgroundColor: '#f5a623', tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        y: { min: 0, max: 10, ticks: { callback: v => v===10?'良い':v===5?'普通':v===1?'悪い':'' } },
                        x: { ticks: { font: { size: 9 } } }
                    }
                }
            });
        }
        window.onload = updateView;
    </script>
</body>
</html>
