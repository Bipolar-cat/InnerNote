<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerNote</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 20px; background: #fdfdfd; color: #333; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        h1 { color: #4a90e2; font-size: 2.2em; margin-bottom: 5px; }
        .sub-header { font-size: 0.85em; color: #666; font-weight: bold; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; font-size: 1.1em; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 1.1em; background: #fff; }
        .save-btn { width: 100%; padding: 18px; background: #4a90e2; color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 1.2em; cursor: pointer; }
        .chart-container { position: relative; height: 300px; width: 100%; margin-top: 40px; }
        .history-item { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.95em; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>InnerNote</h1>
            <div class="sub-header">今の調子を記録しましょう</div>
        </div>
        <div class="input-group">
            <label>今の気分</label>
            <select id="mood-select">
                <option value="1">低い</option>
                <option value="2" selected>普通</option>
                <option value="3">良い</option>
            </select>
        </div>
        <div class="input-group">
            <label>体の調子</label>
            <select id="cond-select">
                <option value="1">悪い</option>
                <option value="2" selected>普通</option>
                <option value="3">良い</option>
            </select>
        </div>
        <button class="save-btn" onclick="saveData()">記録する</button>
        <div class="chart-container"><canvas id="myChart"></canvas></div>
        <div id="history-list"></div>
    </div>

    <script>
        let chartInstance = null;
        function saveData() {
            const mood = document.getElementById('mood-select').value;
            const cond = document.getElementById('cond-select').value;
            const logs = JSON.parse(localStorage.getItem('innernote_logs')) || [];
            const now = new Date();
            const timeStr = (now.getMonth() + 1) + '/' + now.getDate() + ' ' + now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
            logs.push({ time: timeStr, mood: parseInt(mood), condition: parseInt(cond) });
            localStorage.setItem('innernote_logs', JSON.stringify(logs));
            alert("記録しました！");
            updateView();
        }
        function updateView() {
            const logs = JSON.parse(localStorage.getItem('innernote_logs')) || [];
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            logs.slice(-3).reverse().forEach(l => {
                const mText = l.mood == 1 ? "低い" : l.mood == 2 ? "普通" : "良い";
                const cText = l.condition == 1 ? "悪い" : l.condition == 2 ? "普通" : "良い";
                list.innerHTML += `<div class="history-item"><b>${l.time}</b><br>気分: ${mText} / 体: ${cText}</div>`;
            });
            const last10 = logs.slice(-10);
            const ctx = document.getElementById('myChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last10.map(l => l.time),
                    datasets: [
                        { label: '気分', data: last10.map(l => l.mood), borderColor: '#4a90e2', tension: 0.3, fill: false },
                        { label: '体調', data: last10.map(l => l.condition), borderColor: '#f5a623', tension: 0.3, fill: false }
                    ]
                },
                options: { scales: { y: { min: 1, max: 3, ticks: { stepSize: 1 } } } }
            });
        }
        window.onload = updateView;
    </script>
</body>
</html>
