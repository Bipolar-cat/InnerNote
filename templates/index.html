<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerNote - 10step</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 20px; background: #fdfdfd; color: #333; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        h1 { color: #4a90e2; font-size: 2.2em; margin-bottom: 5px; }
        .sub-header { font-size: 0.85em; color: #666; font-weight: bold; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; font-size: 1.1em; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 1.1em; background: #fff; }
        textarea { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 20px; font-size: 1em; background: #fafafa; }
        .save-btn { width: 100%; padding: 18px; background: #4a90e2; color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 1.2em; cursor: pointer; }
        .chart-container { position: relative; height: 300px; width: 100%; margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; }
        .recent-title { text-align: center; font-weight: bold; font-size: 1.2em; margin-top: 40px; color: #444; }
        /* 履歴をカード形式にして見やすく */
        .history-item { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .history-date { display: block; color: #4a90e2; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>InnerNote</h1>
            <div class="sub-header">**気分と調子の変化を記録**</div>
        </div>
        <div class="input-group">
            <label>今の気分 (1:低 ～ 10:高)</label>
            <select id="mood-select">
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5" selected>5</option><option value="6">6</option>
                <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                <option value="10">10</option>
            </select>
        </div>
        <div class="input-group">
            <label>体の調子 (1:悪 ～ 10:良)</label>
            <select id="cond-select">
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5" selected>5</option><option value="6">6</option>
                <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                <option value="10">10</option>
            </select>
        </div>
        <textarea id="note" rows="3" placeholder="今の気持ちをメモ..."></textarea>
        <button class="save-btn" onclick="saveData()">記録する</button>
        
        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>

        <div class="recent-title">最近の記録</div>
        <div id="history-list"></div>
    </div>

    <script>
        let chartInstance = null;

        function saveData() {
            const mood = document.getElementById('mood-select').value;
            const cond = document.getElementById('cond-select').value;
            const note = document.getElementById('note').value;
            const logs = JSON.parse(localStorage.getItem('innernote_10step_final')) || [];
            
            const now = new Date();
            const dateStr = now.getFullYear() + '/' + (now.getMonth() + 1) + '/' + now.getDate();
            const timeStr = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
            
            logs.push({ date: dateStr, time: timeStr, mood: parseInt(mood), condition: parseInt(cond), note: note });
            localStorage.setItem('innernote_10step_final', JSON.stringify(logs));
            
            alert("記録しました！");
            document.getElementById('note').value = "";
            updateView();
        }

        function updateView() {
            const logs = JSON.parse(localStorage.getItem('innernote_10step_final')) || [];
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            
            // 履歴を表示
            if (logs.length > 0) {
                logs.slice().reverse().forEach(l => {
                    list.innerHTML += `
                        <div class="history-item">
                            <span class="history-date">${l.date} ${l.time}</span>
                            <b>気分: ${l.mood} / 体調: ${l.condition}</b><br>
                            <span style="color:#666;">${l.note || ""}</span>
                        </div>`;
                });
            } else {
                list.innerHTML = "<p style='text-align:center; color:#999;'>まだ記録がありません</p>";
            }

            // グラフ描画（データが空でも枠線だけ表示するように修正）
            const last10 = logs.slice(-10);
            const ctx = document.getElementById('myChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last10.length > 0 ? last10.map(l => [l.date, l.time]) : ["まだデータがありません"],
                    datasets: [
                        { label: '気分', data: last10.map(l => l.mood), borderColor: '#4a90e2', tension: 0.3, fill: false },
                        { label: '体調', data: last10.map(l => l.condition), borderColor: '#f5a623', tension: 0.3, fill: false }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            min: 1, 
                            max: 10, 
                            ticks: { stepSize: 1 },
                            title: { display: true, text: 'レベル' }
                        }
                    }
                }
            });
        }
        window.onload = updateView;
    </script>
</body>
</html>
