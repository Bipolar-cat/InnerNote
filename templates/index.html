<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerNote - 診察用まとめ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: auto; padding: 20px; background: #f0f7ff; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #0056b3; text-align: center; font-size: 1.5em; }
        .date-info { text-align: center; font-size: 0.8em; color: #666; margin-bottom: 15px; }
        .btn { width: 100%; padding: 15px; background: #0056b3; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .summary-box { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-top: 15px; }
        .chart-container { position: relative; height: 250px; width: 100%; margin-top: 20px; }
        ul { padding-left: 20px; font-size: 0.9em; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <h1>診察用まとめ</h1>
        <div id="last-date" class="date-info">前回のまとめ：未作成</div>
        <button class="btn" onclick="generateClinicReport()">前回の診察からの記録をまとめる</button>
        
        <div id="report-area" style="display:none;">
            <div class="chart-container">
                <canvas id="clinicChart"></canvas>
            </div>
            <div class="summary-box">
                <strong>【期間中のメモ】</strong>
                <ul id="note-list"></ul>
            </div>
            <button class="btn" style="background:#666; margin-top:15px;" onclick="copyReport()">内容をコピーする</button>
        </div>
    </div>

    <script>
        let myChart = null;

        window.onload = function() {
            const last = localStorage.getItem('last_summary_date');
            if(last) document.getElementById('last-date').innerText = "前回のまとめ：" + new Date(last).toLocaleString('ja-JP');
        };

        function generateClinicReport() {
            const logs = JSON.parse(localStorage.getItem('innernote_logs')) || [];
            const lastSummaryDate = localStorage.getItem('last_summary_date');
            const now = new Date();

            const filteredLogs = lastSummaryDate 
                ? logs.filter(log => new Date(log.isoDate) > new Date(lastSummaryDate))
                : logs.slice(-14);

            if (filteredLogs.length === 0) {
                alert("新しい記録が見つかりませんでした。");
                return;
            }

            const noteList = document.getElementById('note-list');
            noteList.innerHTML = "";
            filteredLogs.forEach(log => {
                if(log.note) {
                    const li = document.createElement('li');
                    li.innerText = `${log.date}: ${log.note}`;
                    noteList.appendChild(li);
                }
            });

            const labels = filteredLogs.map(log => log.date);
            const moodData = filteredLogs.map(log => log.mood);
            const condData = filteredLogs.map(log => log.condition);

            if (myChart) myChart.destroy();
            const ctx = document.getElementById('clinicChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '気分', data: moodData, borderColor: '#ff6384', fill: false, tension: 0.1 },
                        { label: '体調', data: condData, borderColor: '#36a2eb', fill: false, tension: 0.1 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            document.getElementById('report-area').style.display = 'block';
            localStorage.setItem('last_summary_date', now.toISOString());
            document.getElementById('last-date').innerText = "前回のまとめ：" + now.toLocaleString('ja-JP');
        }

        function copyReport() {
            const notes = document.getElementById('note-list').innerText;
            const text = `【診察メモ】\n${notes}`;
            navigator.clipboard.writeText(text).then(() => alert("メモをコピーしました！"));
        }
    </script>
</body>
</html>
